<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/dist/styles.css?v=1">
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-100 to-cyan-100 flex items-center justify-center mx-auto mb-4">
        {{if .Business.Logo}}
        <img src="/static/{{.Business.Logo}}" alt="{{.Business.Name}}" class="w-full h-full object-cover rounded-2xl">
        {{else}}
        <i class="fas fa-store text-teal-500 text-2xl"></i>
        {{end}}
      </div>
      <h1 class="text-xl font-bold text-gray-900">{{.Business.Name}}</h1>
      <p class="text-gray-600 mt-1 capitalize">{{.Business.BusinessType}}</p>
    </div>

    <h2 class="text-lg font-semibold text-center mb-6">Connect to start chatting</h2>

    {{if .Error}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
      <i class="fas fa-exclamation-circle mr-2"></i>
      {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/api/connect/{{.Business.Slug}}/send-otp" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400"></i>
          </div>
          <input type="email" id="email" name="email" required
            class="input pl-10"
            placeholder="your@email.com">
        </div>
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-teal-500 to-cyan-600 text-white py-2.5 px-4 rounded-xl hover:from-teal-600 hover:to-cyan-700 transition-all font-medium shadow-lg shadow-teal-500/25">
        <i class="fas fa-paper-plane mr-2 text-sm"></i>
        Send OTP
      </button>
    </form>

    <div class="text-center mt-6">
      <a href="/b/{{.Business.Slug}}" class="text-sm text-teal-600 hover:text-teal-700">
        <i class="fas fa-arrow-left mr-1"></i> Back to profile
      </a>
    </div>
  </div>
</body>

</html>
