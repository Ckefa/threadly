<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-100 to-cyan-100 flex items-center justify-center mx-auto mb-4">
        {{if .Business.Logo}}
        <img src="/static/{{.Business.Logo}}" alt="{{.Business.Name}}" class="w-full h-full object-cover rounded-2xl">
        {{else}}
        <i class="fas fa-store text-teal-500 text-2xl"></i>
        {{end}}
      </div>
      <h1 class="text-xl font-bold text-gray-900">{{.Business.Name}}</h1>
    </div>

    <h2 class="text-lg font-semibold text-center mb-2">Check your email</h2>
    <p class="text-sm text-gray-600 text-center mb-6">
      We sent a code to <strong>{{.Email}}</strong>
    </p>

    {{if .OTP}}
    <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6 text-center">
      <p class="text-xs text-gray-500 mb-1">Test OTP (development only)</p>
      <p class="text-2xl font-mono font-bold text-teal-600 tracking-widest">{{.OTP}}</p>
    </div>
    {{end}}

    {{if .Error}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
      <i class="fas fa-exclamation-circle mr-2"></i>
      {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/api/connect/{{.Business.Slug}}/verify-otp" class="space-y-4">
      <input type="hidden" name="email" value="{{.Email}}">
      <div>
        <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">Enter OTP Code</label>
        <input type="text" id="otp" name="otp" required maxlength="6" autocomplete="one-time-code"
          class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-center text-2xl font-mono tracking-widest focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
          placeholder="000000"
          pattern="[0-9]{6}"
          inputmode="numeric">
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-teal-500 to-cyan-600 text-white py-2.5 px-4 rounded-xl hover:from-teal-600 hover:to-cyan-700 transition-all font-medium shadow-lg shadow-teal-500/25">
        <i class="fas fa-check mr-2 text-sm"></i>
        Verify & Connect
      </button>
    </form>

    <div class="text-center mt-6">
      <a href="/api/connect/{{.Business.Slug}}" class="text-sm text-teal-600 hover:text-teal-700">
        <i class="fas fa-arrow-left mr-1"></i> Use a different email
      </a>
    </div>
  </div>
</body>

</html>
