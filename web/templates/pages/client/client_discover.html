<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 h-screen overflow-hidden">
  <header class="bg-teal-600 text-white p-4 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <i class="fas fa-compass text-2xl"></i>
      <h1 class="text-xl font-semibold">Discover Businesses</h1>
    </div>
    <div class="flex items-center space-x-4">
      <span class="text-sm">{{.Email}}</span>
      <a href="/client" class="hover:bg-teal-700 px-3 py-2 rounded-lg text-sm">
        <i class="fas fa-arrow-left mr-1"></i> Back
      </a>
    </div>
  </header>

  <div class="max-w-4xl mx-auto p-6">
    <!-- Search -->
    <div class="mb-6">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i class="fas fa-search text-gray-400"></i>
        </div>
        <input type="text" id="searchInput" placeholder="Search businesses by name, type, or slug..."
          class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent shadow-sm">
      </div>
    </div>

    <!-- Results -->
    <div id="business-results" class="space-y-3">
      {{range .Businesses}}
      <div class="business-card bg-white rounded-xl border border-gray-200 p-4 flex items-center justify-between hover:shadow-md transition-shadow">
        <div class="flex items-center space-x-4">
          <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-teal-100 to-cyan-100 flex items-center justify-center overflow-hidden shrink-0">
            {{if .Logo}}
            <img src="/static/{{.Logo}}" alt="{{.Name}}" class="w-full h-full object-cover">
            {{else}}
            <i class="fas fa-store text-teal-500 text-xl"></i>
            {{end}}
          </div>
          <div>
            <h3 class="font-semibold text-gray-900">{{.Name}}</h3>
            <p class="text-sm text-gray-500 capitalize">{{.BusinessType}}</p>
            <p class="text-xs text-gray-400">/b/{{.Slug}}</p>
          </div>
        </div>
        <button onclick="connectToBusiness({{.ID}})"
          class="connect-btn px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors text-sm font-medium">
          <i class="fas fa-plus mr-1"></i> Connect
        </button>
      </div>
      {{else}}
      <div class="text-center py-12 text-gray-500">
        <i class="fas fa-store text-5xl mb-4"></i>
        <p class="text-lg">No businesses available</p>
        <p class="text-sm mt-1">Check back later for new businesses to connect with</p>
      </div>
      {{end}}
    </div>
  </div>

  <script>
    let searchTimeout;

    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const q = this.value.trim();
        fetch('/client/discover/search?q=' + encodeURIComponent(q))
          .then(r => r.json())
          .then(businesses => {
            const container = document.getElementById('business-results');
            if (businesses.length === 0) {
              container.innerHTML = `
                <div class="text-center py-12 text-gray-500">
                  <i class="fas fa-search text-5xl mb-4"></i>
                  <p class="text-lg">No businesses found</p>
                  <p class="text-sm mt-1">Try a different search term</p>
                </div>`;
              return;
            }
            container.innerHTML = businesses.map(b => `
              <div class="business-card bg-white rounded-xl border border-gray-200 p-4 flex items-center justify-between hover:shadow-md transition-shadow">
                <div class="flex items-center space-x-4">
                  <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-teal-100 to-cyan-100 flex items-center justify-center overflow-hidden shrink-0">
                    ${b.logo ? `<img src="/static/${b.logo}" alt="${b.name}" class="w-full h-full object-cover">` : `<i class="fas fa-store text-teal-500 text-xl"></i>`}
                  </div>
                  <div>
                    <h3 class="font-semibold text-gray-900">${b.name}</h3>
                    <p class="text-sm text-gray-500 capitalize">${b.business_type || ''}</p>
                    <p class="text-xs text-gray-400">/b/${b.slug}</p>
                  </div>
                </div>
                <button onclick="connectToBusiness(${b.id})"
                  class="connect-btn px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors text-sm font-medium">
                  <i class="fas fa-plus mr-1"></i> Connect
                </button>
              </div>
            `).join('');
          });
      }, 300);
    });

    function connectToBusiness(businessId) {
      const btn = event.target.closest('.connect-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Connecting...';

      fetch('/client/connect/' + businessId, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            btn.innerHTML = '<i class="fas fa-check mr-1"></i> Connected!';
            btn.classList.remove('bg-teal-600', 'hover:bg-teal-700');
            btn.classList.add('bg-green-500');
            setTimeout(() => {
              window.location.href = '/client?business_id=' + businessId;
            }, 800);
          } else {
            btn.innerHTML = '<i class="fas fa-plus mr-1"></i> Connect';
            btn.disabled = false;
            alert(data.error || 'Failed to connect');
          }
        })
        .catch(() => {
          btn.innerHTML = '<i class="fas fa-plus mr-1"></i> Connect';
          btn.disabled = false;
          alert('Failed to connect');
        });
    }
  </script>
</body>

</html>
