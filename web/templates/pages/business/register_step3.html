<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/dist/styles.css?v=1">
  <script src="/static/js/core/theme.js?v=1"></script>
  <style>
    .strength-bar { transition: width 0.3s ease, background 0.3s ease }
  </style>
</head>
<body class="font-sans antialiased">
  <div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style="background: var(--color-bg);">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-[500px] h-[500px] rounded-full blur-3xl animate-blob" style="background: color-mix(in srgb, var(--color-primary) 10%, transparent);"></div>
      <div class="absolute -bottom-40 -left-40 w-[400px] h-[400px] rounded-full blur-3xl animate-blob" style="background: color-mix(in srgb, var(--color-secondary) 10%, transparent); animation-delay: 4s;"></div>
    </div>

    <div class="card p-8 w-full max-w-lg relative z-10 shadow-lg">
      <div class="text-center mb-6">
        <a href="/" class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 shadow-lg shadow-teal-500/25 mb-3">
          <i class="fas fa-comments text-white text-lg"></i>
        </a>
        <h1 class="text-2xl font-bold text-[var(--color-text)]">Create your account</h1>
        <p class="text-[var(--color-text-secondary)] mt-1 text-sm">Join thousands of businesses on Threadly</p>
      </div>

      <!-- Progress Bar -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-medium text-[var(--color-text-muted)]" id="stepLabel">Step 3 of 3</span>
          <span class="text-xs text-[var(--color-text-muted)]" id="stepName">Password</span>
        </div>
        <div class="flex gap-1">
          <div class="h-1.5 flex-1 rounded-full bg-teal-500" id="progress1"></div>
          <div class="h-1.5 flex-1 rounded-full bg-teal-500" id="progress2"></div>
          <div class="h-1.5 flex-1 rounded-full bg-teal-500" id="progress3"></div>
        </div>
      </div>

      {{if .Error}}
      <div class="bg-[var(--color-error-light)] text-[var(--color-error)] px-4 py-3 rounded-xl mb-4 flex items-center gap-2 text-sm border" style="border-color: color-mix(in srgb, var(--color-error) 20%, transparent);">
        <i class="fas fa-exclamation-circle"></i>
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/business/register/step3?token={{.Token}}" id="registerForm">
        <input type="hidden" name="name" value="{{.Name}}">
        <input type="hidden" name="username" value="{{.Username}}">
        <input type="hidden" name="email" value="{{.Email}}">
        <input type="hidden" name="business_type" value="{{.BusinessType}}">

        <div class="space-y-4">
          <div>
            <label for="password" class="block text-sm font-medium text-[var(--color-text-secondary)] mb-1.5">Password</label>
            <div class="relative input-with-icon">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password" name="password" required minlength="6"
                class="input"
                placeholder="Create a strong password" oninput="checkStrength(); onRegPwInput()">
              <button type="button" onclick="toggleRegPassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[var(--color-text-muted)] hover:text-[var(--color-text-secondary)] transition-colors">
                <i class="fas fa-eye" id="regPwIcon"></i>
              </button>
            </div>
            <p class="text-xs text-[var(--color-error)] mt-1 hidden" id="regPwError">Password must be at least 6 characters</p>
            <div class="mt-2">
              <div class="h-1.5 rounded-full overflow-hidden" style="background: var(--color-surface-tertiary);">
                <div class="h-full rounded-full" id="strengthBar" style="width:0%; background: transparent;"></div>
              </div>
              <p class="text-xs mt-1" id="strengthLabel" style="color: var(--color-text-muted);"></p>
            </div>
          </div>
          <div>
            <label for="confirm_password" class="block text-sm font-medium text-[var(--color-text-secondary)] mb-1.5">Confirm Password</label>
            <div class="relative input-with-icon">
              <i class="fas fa-check-circle input-icon"></i>
              <input type="password" id="confirm_password" required class="input" placeholder="Repeat your password" oninput="checkMatch()">
            </div>
            <p class="text-xs text-[var(--color-error)] mt-1 hidden" id="matchError">Passwords do not match</p>
            <p class="text-xs text-emerald-500 mt-1 hidden" id="matchSuccess"><i class="fas fa-check mr-0.5"></i>Passwords match</p>
          </div>
        </div>
        <div class="mt-5 flex justify-between">
          <a href="/business/register/step2?token={{.Token}}" class="btn btn-secondary">
            <i class="fas fa-arrow-left text-xs"></i> Back
          </a>
          <button type="submit" id="registerBtn" class="btn btn-primary">
            <span id="regBtnText">Create Account</span>
            <i class="fas fa-arrow-right text-xs" id="regBtnIcon"></i>
            <i class="fas fa-spinner fa-spin hidden" id="regBtnSpinner"></i>
          </button>
        </div>
      </form>

      <div class="text-center mt-6">
        <p class="text-sm text-[var(--color-text-secondary)]">
          Already have an account?
          <a href="/business/login" class="link font-medium">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/static/js/modules/shared.js?v=1"></script>
  <script>
    function toggleRegPassword() {
      var pw = document.getElementById('password');
      var icon = document.getElementById('regPwIcon');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      icon.className = pw.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    function checkStrength() {
      var pw = document.getElementById('password').value;
      var bar = document.getElementById('strengthBar');
      var label = document.getElementById('strengthLabel');
      var score = 0;
      if (pw.length >= 8) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^a-zA-Z0-9]/.test(pw)) score++;
      var levels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
      var colors = ['transparent', '#ef4444', '#f59e0b', '#eab308', '#22c55e', '#10b981'];
      var widths = ['0%', '20%', '40%', '60%', '80%', '100%'];
      bar.style.width = widths[score];
      bar.style.background = colors[score];
      label.textContent = pw.length ? levels[score] : '';
      label.className = 'text-xs mt-1 ' + (score >= 3 ? 'text-emerald-500' : score >= 2 ? 'text-amber-500' : 'text-rose-500');
    }

    function checkMatch() {
      var pw = document.getElementById('password').value;
      var cpw = document.getElementById('confirm_password').value;
      var err = document.getElementById('matchError');
      var ok = document.getElementById('matchSuccess');
      if (!cpw) { err.classList.add('hidden'); ok.classList.add('hidden'); return; }
      if (pw === cpw) { err.classList.add('hidden'); ok.classList.remove('hidden'); }
      else { err.classList.remove('hidden'); ok.classList.add('hidden'); }
    }

    function onRegPwInput() {
      var pw = document.getElementById('password');
      var err = document.getElementById('regPwError');
      if (pw.value.length >= 6) { err.classList.add('hidden'); pw.classList.remove('input-error'); }
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      var pw = document.getElementById('password');
      var pwErr = document.getElementById('regPwError');
      pwErr.classList.add('hidden');
      pw.classList.remove('input-error');
      if (pw.value.length < 6) {
        pwErr.classList.remove('hidden');
        pw.classList.add('input-error');
        e.preventDefault();
        return;
      }
      if (pw.value !== document.getElementById('confirm_password').value) {
        e.preventDefault();
        document.getElementById('matchError').classList.remove('hidden');
        return;
      }
      document.getElementById('regBtnText').textContent = 'Creating account...';
      document.getElementById('regBtnIcon').classList.add('hidden');
      document.getElementById('regBtnSpinner').classList.remove('hidden');
      document.getElementById('registerBtn').disabled = true;
    });
  </script>
</body>
</html>
