<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @keyframes shake {

      0%,
      30%,
      100% {
        transform: translateX(0);
      }

      5%,
      15%,
      25% {
        transform: translateX(-2px);
      }

      10%,
      20% {
        transform: translateX(2px);
      }
    }

    .shake-notification {
      animation: shake 1s ease-in-out infinite;
    }

    .unread-badge {
      background-color: #ef4444;
      color: white;
      font-size: 12px;
      font-weight: bold;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    .unread-badge[data-count="1"] {
      background-color: #f59e0b;
    }
  </style>
</head>

<body class="bg-gray-100 h-screen overflow-hidden">
  <header class="bg-teal-600 text-white p-4 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <i class="fas fa-comments text-2xl"></i>
      <h1 class="text-xl font-semibold">Threadly</h1>
    </div>
    <div class="flex items-center space-x-4">
      <a href="/business/dashboard"
        class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg flex items-center space-x-2 relative">
        <i class="fas fa-chart-line"></i>
        <span>Business</span>
        {{if gt .TotalPending 0}}
        <span
          class="shake-notification absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">
          {{.TotalPending}}
        </span>
        {{end}}
      </a>
      <button onclick="showNewClientModal()"
        class="bg-teal-700 hover:bg-teal-800 px-4 py-2 rounded-lg flex items-center space-x-2">
        <i class="fas fa-plus"></i>
        <span>New Customer</span>
      </button>
      <a href="/business/logout" class="hover:bg-teal-700 px-3 py-2 rounded-lg">
        <i class="fas fa-sign-out-alt"></i>
      </a>
    </div>
  </header>

  <div class="flex h-[calc(100vh-72px)]">
    {{ template "biz-sidebar" .}}
    <main class="flex-1 flex flex-col bg-gray-50" id="chat-area">
      {{template "empty_state" "Select a client to start chatting"}}
    </main>
  </div>

  {{template "new-client" .}}
  {{template "quick-order" .}}
  {{template "quick-booking" .}}

  <script src="/static/js/modules/shared.js"></script>
  <script src="/static/js/modules/business.js"></script>
</body>

</html>
