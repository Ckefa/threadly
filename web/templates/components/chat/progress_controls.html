{{define "progress_controls"}}
<div class="bg-[var(--color-surface-secondary)] border-b border-[var(--color-border)] px-6 py-3">
  <div class="flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <span class="text-sm font-medium text-[var(--color-text-secondary)]">Conversation Progress:</span>
      <select
        class="conversation-progress-dropdown px-3 py-1 border border-[var(--color-border)] rounded-lg text-sm bg-[var(--color-surface)] text-[var(--color-text)] focus:outline-none focus:ring-2 focus:ring-teal-500"
        data-conversation-id="{{.Customer.ConversationID}}">
        <option value="initial" {{if eq .Progress.CurrentStage "initial" }}selected{{end}}>Initial Contact</option>
        <option value="qualification" {{if eq .Progress.CurrentStage "qualification" }}selected{{end}}>Qualification
        </option>
        <option value="negotiation" {{if eq .Progress.CurrentStage "negotiation" }}selected{{end}}>Negotiation</option>
        <option value="confirmation" {{if eq .Progress.CurrentStage "confirmation" }}selected{{end}}>Confirmation
        </option>
        <option value="in_progress" {{if eq .Progress.CurrentStage "in_progress" }}selected{{end}}>In Progress</option>
        <option value="completed" {{if eq .Progress.CurrentStage "completed" }}selected{{end}}>Completed</option>
        <option value="follow_up" {{if eq .Progress.CurrentStage "follow_up" }}selected{{end}}>Follow Up</option>
      </select>
      <button class="save-chat-progress-btn px-3 py-1 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700"
        data-conversation-id="{{.Customer.ConversationID}}">
        <i class="fas fa-save mr-1"></i>Save Progress
      </button>
    </div>
    <div class="relative w-20 h-20 flex-shrink-0"
         x-data="{ circ: 2 * Math.PI * 48 }">
      <svg class="w-full h-full -rotate-90" viewBox="0 0 120 120">
        <defs>
          <radialGradient id="tubeGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="var(--color-primary-light)" />
            <stop offset="30%" stop-color="var(--color-primary)" />
            <stop offset="70%" stop-color="var(--color-primary)" />
            <stop offset="100%" stop-color="var(--color-primary-dark)" />
          </radialGradient>
          <filter id="ringShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="var(--color-primary-dark)" flood-opacity="0.45"/>
          </filter>
        </defs>
        <circle cx="60" cy="60" r="48" fill="none" stroke="var(--color-border)" stroke-width="14"/>
        <circle cx="60" cy="60" r="48" fill="none" stroke="url(#tubeGrad)" stroke-width="12"
                stroke-linecap="round"
                stroke-dasharray="301.59"
                stroke-dashoffset="301.59"
                :stroke-dashoffset="circ * (1 - {{.Progress.ProgressScore}} / 100)"
                filter="url(#ringShadow)"
                style="transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1)"/>
        <circle cx="60" cy="60" r="38" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1.5"/>
        <circle cx="60" cy="60" r="38" fill="none" stroke="var(--color-text-inverse)" stroke-width="3" opacity="0.5"/>
      </svg>
      <div class="absolute inset-0 flex items-center justify-center flex-col">
        <span class="text-base font-black text-[var(--color-text)] leading-none">{{.Progress.ProgressScore}}%</span>
        <span class="text-[10px] font-semibold text-[var(--color-primary)] mt-0.5 tracking-wide">COMPLETE</span>
      </div>
    </div>
  </div>
</div>
{{end}}
