{{define "progress_controls"}}
<div class="bg-gray-50 border-b border-gray-200 px-6 py-3">
  <div class="flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <span class="text-sm font-medium text-gray-700">Conversation Progress:</span>
      <select
        class="conversation-progress-dropdown px-3 py-1 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
        data-conversation-id="{{.Customer.ConversationID}}">
        <option value="initial" {{if eq .Progress.CurrentStage "initial" }}selected{{end}}>Initial Contact</option>
        <option value="qualification" {{if eq .Progress.CurrentStage "qualification" }}selected{{end}}>Qualification
        </option>
        <option value="negotiation" {{if eq .Progress.CurrentStage "negotiation" }}selected{{end}}>Negotiation</option>
        <option value="confirmation" {{if eq .Progress.CurrentStage "confirmation" }}selected{{end}}>Confirmation
        </option>
        <option value="in_progress" {{if eq .Progress.CurrentStage "in_progress" }}selected{{end}}>In Progress</option>
        <option value="completed" {{if eq .Progress.CurrentStage "completed" }}selected{{end}}>Completed</option>
        <option value="follow_up" {{if eq .Progress.CurrentStage "follow_up" }}selected{{end}}>Follow Up</option>
      </select>
      <button class="save-chat-progress-btn px-3 py-1 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700"
        data-conversation-id="{{.Customer.ConversationID}}">
        <i class="fas fa-save mr-1"></i>Save Progress
      </button>
    </div>
    <div class="relative w-20 h-20 flex-shrink-0"
         x-data="{ show: false, circ: 2 * Math.PI * 48 }"
         x-init="setTimeout(() => show = true, 200)">
      <svg class="w-full h-full -rotate-90" viewBox="0 0 120 120">
        <defs>
          <radialGradient id="tubeGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#5eead4" />
            <stop offset="30%" stop-color="#14b8a6" />
            <stop offset="70%" stop-color="#0d9488" />
            <stop offset="100%" stop-color="#0f766e" />
          </radialGradient>
          <filter id="ringShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#0f766e" flood-opacity="0.45"/>
          </filter>
          <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-1" dy="-1" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.6"/>
          </filter>
        </defs>
        <circle cx="60" cy="60" r="48" fill="none" stroke="#cbd5e1" stroke-width="14"/>
        <circle cx="60" cy="60" r="48" fill="none" stroke="#f1f5f9" stroke-width="10" filter="url(#innerGlow)"/>
        <circle cx="60" cy="60" r="48" fill="none" stroke="url(#tubeGrad)" stroke-width="12"
                stroke-linecap="round"
                stroke-dasharray="301.59"
                :stroke-dashoffset="show ? (circ * (1 - {{.Progress.ProgressScore}} / 100)) : circ"
                filter="url(#ringShadow)"
                style="transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1)"/>
        <circle cx="60" cy="60" r="38" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
        <circle cx="60" cy="60" r="38" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
      </svg>
      <div class="absolute inset-0 flex items-center justify-center flex-col">
        <span class="text-base font-black text-gray-800 leading-none">{{.Progress.ProgressScore}}%</span>
        <span class="text-[10px] font-semibold text-teal-600 mt-0.5 tracking-wide">COMPLETE</span>
      </div>
    </div>
  </div>
</div>
{{end}}
