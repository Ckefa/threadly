{{define "client_message_input"}}
<div class="bg-white border-t border-gray-200 p-4" style="position: sticky; bottom: 0;">
  <div class="flex space-x-2 mb-3">
    <button onclick="openClientProductPicker()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm flex items-center space-x-1">
      <i class="fas fa-shopping-cart"></i>
      <span>Place Order</span>
    </button>
    <button onclick="openClientServicePicker()"
      class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded-lg text-sm flex items-center space-x-1">
      <i class="fas fa-concierge-bell"></i>
      <span>Request Service</span>
    </button>
  </div>

  <form id="message-form" hx-post="/client/businesses/{{.Business.ID}}/messages" hx-target="#messages-container"
    hx-swap="beforeend" hx-on::after-request="this.reset()">
    <div class="flex space-x-3">
      <input type="text" name="content" placeholder="Type a message..."
        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
        required>
      <input type="hidden" name="sender" value="client">
      <button type="submit" class="bg-teal-600 text-white px-6 py-2 rounded-lg hover:bg-teal-700">
        <i class="fas fa-paper-plane"></i> Send
      </button>
    </div>
  </form>
</div>
{{end}}
