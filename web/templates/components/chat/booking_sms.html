{{define "booking-sms"}}
<div class="flex justify-end">
  <div class="max-w-xs lg:max-w-md w-full">
    <div class="bg-purple-50 border border-purple-200 rounded-lg px-4 py-3" data-message-id="${booking.id}"
      data-booking-id="${booking.id}">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center space-x-2">
          <i class="fas fa-calendar text-purple-600"></i>
          <span class="font-semibold text-purple-800 text-sm">Booking</span>
          <span class="text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded">Pending</span>
        </div>
        <button onclick="openEditBookingModal(${booking.id})" class="text-purple-600 hover:text-purple-800 text-xs"
          title="Edit Booking">
          <i class="fas fa-edit"></i>
        </button>
      </div>
      <div class="booking-details text-sm text-gray-700">
        <p class="text-sm">${bookingContent}</p>
        <p class="hidden booking-notes-data">${booking.notes || ''}</p>
      </div>
      <div class="flex items-center justify-between mt-2">
        <p class="text-xs text-gray-500">${new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit',
          hour12: true})}</p>
      </div>
    </div>
  </div>
</div>
{{end}}
