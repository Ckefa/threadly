{{ define "new-client"}}

<!-- New Client Modal -->
<div id="new-client-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-96">
    <h2 class="text-xl font-semibold mb-4">Add New Customer</h2>
    <form id="new-client-form">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Name *</label>
        <input type="text" name="name" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" name="email"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
        <input type="tel" name="phone"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
      </div>
      <div class="flex justify-end space-x-3">
        <button type="button" onclick="hideNewClientModal()"
          class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700">Add
          Customer</button>
      </div>
    </form>
  </div>
</div>


{{end}}
