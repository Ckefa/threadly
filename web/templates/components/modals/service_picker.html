{{define "service_picker"}}
<div id="servicePickerModal" class="fixed inset-0 bg-gray-900/50 hidden overflow-y-auto h-full w-full z-50 backdrop-blur-sm">
  <div class="relative top-8 mx-auto p-0 border w-full max-w-3xl shadow-2xl rounded-2xl bg-white max-h-[90vh] flex flex-col">

    <!-- ====== HEADER ====== -->
    <div class="p-5 border-b border-gray-200 flex items-center justify-between bg-gradient-to-r from-purple-500 to-pink-600 rounded-t-2xl text-white flex-shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center flex-shrink-0">
          <i class="fas fa-concierge-bell text-lg"></i>
        </div>
        <div class="min-w-0">
          <h3 class="text-lg font-bold">
            <span id="servicePickerTitle">Book a Service</span>
          </h3>
          <p class="text-xs text-white/80 mt-0.5" id="servicePickerCount">Loading services...</p>
        </div>
      </div>
      <button onclick="hideServicePicker()" class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition hover:scale-110 active:scale-95 flex-shrink-0">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- ====== STEP INDICATOR ====== -->
    <div class="flex items-center justify-center gap-0 px-6 py-3 bg-gray-50 border-b border-gray-200 flex-shrink-0">
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" id="svcStep1Indicator">1</span>
        <span class="text-xs font-medium" id="svcStep1Label">Choose</span>
      </div>
      <div class="w-12 h-px mx-2" id="svcStep1to2"></div>
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" id="svcStep2Indicator">2</span>
        <span class="text-xs font-medium" id="svcStep2Label">Details</span>
      </div>
      <div class="w-12 h-px mx-2" id="svcStep2to3"></div>
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" id="svcStep3Indicator">3</span>
        <span class="text-xs font-medium" id="svcStep3Label">Confirm</span>
      </div>
    </div>

    <!-- ====== STEP 1: SERVICE GRID ====== -->
    <div id="servicePickerStep1" class="flex flex-col flex-1 min-h-0">
      <!-- Search -->
      <div class="p-4 border-b border-gray-100 flex-shrink-0">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
          <input type="text" id="servicePickerSearch" placeholder="Search by name or category..."
            class="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent bg-gray-50 text-sm transition"
            oninput="filterPickerServices()">
          <button onclick="document.getElementById('servicePickerSearch').value='';filterPickerServices()" class="absolute right-3 top-3 text-gray-300 hover:text-gray-500 hidden" id="servicePickerSearchClear">
            <i class="fas fa-times-circle"></i>
          </button>
        </div>
      </div>

      <!-- Category Filters -->
      <div class="px-4 pt-3 pb-1 flex-shrink-0 overflow-x-auto">
        <div class="flex gap-1.5 flex-wrap" id="servicePickerCategoryFilter"></div>
      </div>

      <!-- Service Grid -->
      <div class="flex-1 overflow-y-auto p-4" id="servicePickerGrid">
        <div class="text-center py-16 text-gray-400">
          <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
          <p class="text-sm">Loading services...</p>
        </div>
      </div>
    </div>

    <!-- ====== STEP 2: BOOKING DETAILS ====== -->
    <div id="servicePickerStep2" class="hidden flex flex-col flex-1 min-h-0">
      <div class="flex-1 overflow-y-auto p-5">
        <button onclick="backToServiceGrid()" class="text-sm text-purple-600 hover:text-purple-800 flex items-center gap-1.5 mb-5 group">
          <span class="w-6 h-6 rounded-full bg-purple-100 group-hover:bg-purple-200 flex items-center justify-center transition">
            <i class="fas fa-arrow-left text-xs"></i>
          </span>
          <span class="font-medium">Back to services</span>
        </button>

        <!-- Selected Service Card -->
        <div class="bg-gradient-to-br from-purple-50 via-white to-pink-50 border border-purple-200 rounded-2xl p-5 mb-6 relative overflow-hidden shadow-sm">
          <div class="absolute top-0 right-0 w-32 h-32 bg-purple-100 rounded-full -mr-12 -mt-12 opacity-30"></div>
          <div class="absolute bottom-0 left-0 w-20 h-20 bg-pink-100 rounded-full -ml-8 -mb-8 opacity-30"></div>
          <div class="flex items-center gap-4 relative z-10">
            <div id="selectedServiceImage" class="w-16 h-16 rounded-xl bg-white shadow-sm flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden border border-purple-100">
              <i class="fas fa-concierge-bell text-purple-600"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 id="selectedServiceName" class="font-bold text-lg text-gray-900 truncate">Service Name</h4>
              <span id="selectedServiceCategory" class="text-[11px] text-purple-500 bg-purple-100 px-2 py-0.5 rounded inline-block mt-0.5"></span>
              <p class="text-sm text-gray-500 mt-1">
                <span id="selectedServiceDuration" class="mr-3"></span>
                <span id="selectedServicePrice" class="font-semibold text-purple-700"></span>
              </p>
              <p id="selectedServiceDesc" class="text-xs text-gray-400 mt-1 line-clamp-2"></p>
            </div>
          </div>
        </div>

        <!-- Booking Form -->
        <form id="serviceBookingForm" class="space-y-4">
          <input type="hidden" id="servicePickerServiceId">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">
                <i class="fas fa-calendar-day text-purple-500 mr-1"></i> Date
              </label>
              <input type="date" id="servicePickerDate" required
                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm transition bg-white">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">
                <i class="fas fa-clock text-purple-500 mr-1"></i> Time
              </label>
              <input type="time" id="servicePickerTime" required
                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm transition bg-white">
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">
              <i class="fas fa-pen text-purple-500 mr-1"></i> Notes <span class="text-gray-400 font-normal">(optional)</span>
            </label>
            <textarea id="servicePickerNotes" rows="2" placeholder="Add any special requests or notes..."
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none text-sm transition bg-white"></textarea>
          </div>
        </form>
      </div>

      <!-- Footer -->
      <div class="border-t border-gray-200 p-4 bg-white rounded-b-2xl flex-shrink-0">
        <div class="flex gap-3">
          <button onclick="backToServiceGrid()" class="flex-1 py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50 text-sm font-semibold transition active:scale-[0.98]">
            <i class="fas fa-arrow-left mr-1"></i> Change
          </button>
          <button onclick="servicePickerGoToStep(3)" class="flex-[2] py-3 px-4 rounded-xl bg-gradient-to-r from-purple-500 to-pink-600 text-white text-sm font-bold shadow-lg shadow-purple-200 hover:from-purple-600 hover:to-pink-700 transition active:scale-[0.98]">
            Continue <i class="fas fa-arrow-right ml-1"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- ====== STEP 3: CONFIRMATION ====== -->
    <div id="servicePickerStep3" class="hidden flex flex-col flex-1 min-h-0">
      <div class="flex-1 overflow-y-auto p-5">
        <button onclick="servicePickerGoToStep(2)" class="text-sm text-purple-600 hover:text-purple-800 flex items-center gap-1.5 mb-5 group">
          <span class="w-6 h-6 rounded-full bg-purple-100 group-hover:bg-purple-200 flex items-center justify-center transition">
            <i class="fas fa-arrow-left text-xs"></i>
          </span>
          <span class="font-medium">Back to details</span>
        </button>

        <div class="flex items-center gap-2 mb-4">
          <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center">
            <i class="fas fa-check text-purple-600 text-sm"></i>
          </div>
          <h4 class="text-base font-bold text-gray-900">Review & Confirm</h4>
        </div>

        <!-- Confirmation Card -->
        <div id="servicePickerConfirmInfo"></div>

        <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700 flex items-start gap-2">
          <i class="fas fa-info-circle mt-0.5"></i>
          <span id="servicePickerConfirmHint">
            <span class="font-semibold">You're almost done!</span> Review the details above before submitting your request.
          </span>
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-gray-200 p-4 bg-white rounded-b-2xl flex-shrink-0">
        <div class="flex gap-3">
          <button onclick="servicePickerGoToStep(2)" class="flex-1 py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50 text-sm font-semibold transition active:scale-[0.98]">
            <i class="fas fa-arrow-left mr-1"></i> Edit Details
          </button>
          <button id="servicePickerSubmitBtn" onclick="submitServiceBooking()"
            class="flex-[2] py-3 px-4 rounded-xl bg-gradient-to-r from-purple-500 to-pink-600 text-white text-sm font-bold shadow-lg shadow-purple-200 hover:from-purple-600 hover:to-pink-700 transition active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
            <i class="fas fa-calendar-check mr-1"></i> Create Booking
          </button>
        </div>
        <p class="text-[10px] text-gray-400 text-center mt-2">
          <i class="fas fa-info-circle mr-0.5"></i>
          <span id="servicePickerSubmitHint">The business will confirm your booking</span>
        </p>
      </div>
    </div>

  </div>
</div>
{{end}}
