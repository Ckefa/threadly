{{define "business_profile"}}
<div id="businessProfileModal"
  class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
  <div class="relative top-20 mx-auto p-5 border w-[28rem] shadow-lg rounded-md bg-white">
    <div class="mt-3">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-lg font-medium text-gray-900">Business Profile</h3>
        <button onclick="hideBusinessProfile()" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="businessProfileForm" class="space-y-4 mt-4">
        <div class="flex justify-center mb-4">
          <div class="relative">
            <div id="profileLogoPreview"
              class="w-20 h-20 bg-teal-100 rounded-full flex items-center justify-center overflow-hidden">
              {{if .Business.Logo}}
              <img src="/static/{{.Business.Logo}}" alt="Logo" class="w-full h-full object-cover">
              {{else}}
              <i class="fas fa-store text-teal-600 text-2xl"></i>
              {{end}}
            </div>
            <button type="button" onclick="document.getElementById('profileLogoInput').click()"
              class="absolute -bottom-1 -right-1 bg-white rounded-full p-1.5 shadow-md border border-gray-200 hover:bg-gray-50">
              <i class="fas fa-camera text-gray-600 text-sm"></i>
            </button>
            <input type="file" id="profileLogoInput" name="logo" accept="image/*" class="hidden">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Business Name</label>
          <input type="text" id="profileName" value="{{.Business.Name}}" required
            class="input mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Owner Username</label>
          <input type="text" id="profileUsername" value="{{.Business.Username}}" required
            class="input mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="profileEmail" value="{{.Business.Email}}" required
            class="input mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">New Password</label>
          <input type="password" id="profilePassword" placeholder="Leave blank to keep current"
            class="input mt-1">
        </div>
        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
          <button type="button" onclick="hideBusinessProfile()"
            class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded">
            Cancel
          </button>
          <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{{end}}
