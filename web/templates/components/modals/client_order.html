{{ define "client_order" }}
<!-- Client Order Modal -->
<div id="clientOrderModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
  <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
    <div class="mt-3">
      <h3 class="text-lg font-medium text-gray-900">Place Order</h3>
      <form id="clientOrderForm" class="mt-4 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Select Product</label>
          <select id="clientOrderProduct" required
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            <option value="">Choose a product...</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Quantity</label>
          <input type="number" id="clientOrderQuantity" min="1" value="1" required
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Delivery Address</label>
          <textarea id="clientOrderAddress" rows="2" placeholder="Enter delivery address..."
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Notes</label>
          <textarea id="clientOrderNotes" rows="2" placeholder="Any special requests..."
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
        </div>
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="hideClientOrderModal()"
            class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded">
            Cancel
          </button>
          <button type="button" onclick="console.log('Dashboard button clicked!'); submitOrderForm()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Send Order Request
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{{ end }}
