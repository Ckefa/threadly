{{define "edit_booking_modal"}}
<div id="editBookingModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
  <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
    <div class="mt-3">
      <h3 class="text-lg font-medium text-gray-900">Edit Booking</h3>
      <form id="editBookingForm" class="mt-4 space-y-4">
        <input type="hidden" id="editBookingId">
        <div>
          <label class="block text-sm font-medium text-gray-700">Date</label>
          <input type="date" id="editBookingDate" required
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-purple-500 focus:border-purple-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Time</label>
          <input type="time" id="editBookingTime" required
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-purple-500 focus:border-purple-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Notes</label>
          <textarea id="editBookingNotes" rows="3" placeholder="Update booking notes..."
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-purple-500 focus:border-purple-500"></textarea>
        </div>
        <div class="flex justify-end space-x-3 pt-4">
          <button type="button" onclick="hideEditBookingModal()"
            class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded">
            Cancel
          </button>
          <button type="button" onclick="submitEditBooking()"
            class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded">
            Update Booking
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{{end}}
