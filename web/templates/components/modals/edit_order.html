{{define "edit_order_modal"}}
<div id="editOrderModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
  <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
    <div class="mt-3">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-lg font-medium text-gray-900">Edit Order</h3>
        <span id="editOrderStatusBadge" class="text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">pending</span>
      </div>
      <p id="editOrderNumber" class="text-xs text-gray-500 mb-4">Loading...</p>
      <form id="editOrderForm" class="space-y-4">
        <input type="hidden" id="editOrderId">
        <div>
          <label class="block text-sm font-medium text-gray-700">Quantity</label>
          <input type="number" id="editOrderQuantity" min="1" required
            class="input mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Notes</label>
          <textarea id="editOrderNotes" rows="3" placeholder="Update order notes..."
            class="input mt-1"></textarea>
        </div>
        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
          <button type="button" onclick="hideEditOrderModal()"
            class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded">
            Cancel
          </button>
          <button type="button" onclick="submitEditOrder()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Update Order
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{{end}}
