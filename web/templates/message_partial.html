<div class="flex {{if eq .Message.Sender "business"}}justify-end{{else}}justify-start{{end}}">
    <div class="max-w-xs lg:max-w-md">
        <div class="{{if eq .Message.Sender "business"}}bg-teal-600 text-white{{else}}bg-gray-200 text-gray-800{{end}} rounded-lg px-4 py-2">
            <p class="text-sm">{{.Message.Content}}</p>
        </div>
        <div class="flex items-center justify-between mt-1">
            <p class="text-xs text-gray-500">{{.Message.CreatedAt.Format "3:04 PM"}}</p>
            {{if eq .Message.Sender "client"}}
            <div class="flex space-x-1">
                <button data-message-id="{{.Message.ID}}" 
                        class="enhanced-action-btn text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200" title="Create Detailed Action">
                    <i class="fas fa-plus mr-1"></i>Action
                </button>
                <button data-message-id="{{.Message.ID}}" data-action-type="task"
                        class="quick-action-btn text-xs text-blue-600 hover:text-blue-800" title="Quick Task">
                    <i class="fas fa-tasks"></i>
                </button>
                <button data-message-id="{{.Message.ID}}" data-action-type="reminder"
                        class="quick-action-btn text-xs text-yellow-600 hover:text-yellow-800" title="Quick Reminder">
                    <i class="fas fa-bell"></i>
                </button>
                <button data-message-id="{{.Message.ID}}" data-action-type="booking"
                        class="quick-action-btn text-xs text-green-600 hover:text-green-800" title="Quick Booking">
                    <i class="fas fa-calendar"></i>
                </button>
            </div>
            {{end}}
        </div>
    </div>
</div>
