<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Set</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg p-6 max-w-md w-full">
      <div class="flex items-center mb-4">
        <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
          <i class="fas fa-bullseye text-purple-600 text-xl"></i>
        </div>
        <div class="ml-4">
          <h3 class="text-lg font-semibold text-gray-900">Goal Set!</h3>
          <p class="text-gray-600">A new goal has been set for <span class="font-medium">{{.Client.Name}}</span></p>
        </div>
      </div>

      <div class="bg-purple-50 border border-purple-200 rounded-lg p-4">
        <h4 class="font-semibold text-purple-800 mb-2">🎯 Goal Details</h4>
        <div class="space-y-2">
          <div>
            <label class="block text-sm font-medium text-gray-700">Goal:</label>
            <p class="text-gray-900">{{.Action.Description}}</p>
          </div>
          {{if .Action.DueDate}}
          <div>
            <label class="block text-sm font-medium text-gray-700">Target Date:</label>
            <p class="text-gray-900">{{.Action.DueDate.Format "2006-01-02"}}</p>
          </div>
          {{end}}
          <div>
            <label class="block text-sm font-medium text-gray-700">Customer:</label>
            <p class="text-gray-900">{{.Client.Name}} ({{.Client.Email}})</p>
          </div>
        </div>

        <div class="mt-4 flex justify-end space-x-3">
          <button onclick="window.close()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
            Close
          </button>
          <button onclick="window.location.href='/clients/{{.Customer.ID}}'"
            class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
            View Customer
          </button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
